<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 790 180" role="img" aria-labelledby="forecast-title forecast-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="forecast-title">Forecast View architecture — reconstructed from the project implementation</title>
  <desc id="forecast-desc">Historical sales data is mapped by SKU and built into a panel, then per-SKU models — a custom Prophet-style Ridge regression and LightGBM, with statsmodels ETS and Croston as fallbacks — are selected by lowest error. Forecasts and root-cause metrics are written back to PostgreSQL, optionally explained by an LLM, and rendered on a FastAPI dashboard with Chart.js.</desc>
  <defs>
    <marker id="forecast-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M170,34 L190,34" stroke="#6b7382" stroke-width="1.5" marker-end="url(#forecast-arrow)"/>
  <path d="M350,34 L370,34" stroke="#6b7382" stroke-width="1.5" marker-end="url(#forecast-arrow)"/>
  <path d="M560,34 L580,34" stroke="#6b7382" stroke-width="1.5" marker-end="url(#forecast-arrow)"/>
  <path d="M675,58 L210,120" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#forecast-arrow)"/>
  <path d="M295,144 L315,144" stroke="#6b7382" stroke-width="1.5" marker-end="url(#forecast-arrow)"/>
  <path d="M465,144 L485,144" stroke="#6b7382" stroke-width="1.5" marker-end="url(#forecast-arrow)"/>

  <rect x="20" y="10" width="150" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="95" y="30" text-anchor="middle" font-size="10" fill="#eef1f4">PostgreSQL</text>
  <text x="95" y="44" text-anchor="middle" font-size="9" fill="#a7afba">forecast_data</text>

  <rect x="190" y="10" width="160" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="270" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">SKU Mapping &amp;</text>
  <text x="270" y="44" text-anchor="middle" font-size="9.5" fill="#eef1f4">Panel Build</text>

  <rect x="370" y="10" width="190" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="465" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">Model Selection</text>
  <text x="465" y="44" text-anchor="middle" font-size="8.5" fill="#a7afba">Ridge + LightGBM, ETS/Croston</text>

  <rect x="580" y="10" width="190" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="675" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">Forecast +</text>
  <text x="675" y="44" text-anchor="middle" font-size="9.5" fill="#eef1f4">Root-Cause Metrics</text>

  <rect x="125" y="120" width="170" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="210" y="140" text-anchor="middle" font-size="10" fill="#eef1f4">PostgreSQL</text>
  <text x="210" y="154" text-anchor="middle" font-size="9" fill="#a7afba">forecast_results</text>

  <rect x="315" y="120" width="150" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="390" y="148" text-anchor="middle" font-size="10" fill="#eef1f4">LLM Explanation</text>

  <rect x="485" y="120" width="180" height="48" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="575" y="140" text-anchor="middle" font-size="9.5" fill="#eef1f4">FastAPI Dashboard</text>
  <text x="575" y="154" text-anchor="middle" font-size="8.5" fill="#a7afba">Chart.js</text>
</svg>
