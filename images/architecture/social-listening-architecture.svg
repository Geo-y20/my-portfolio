<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-labelledby="social-title social-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="social-title">Social Listening Intelligence architecture</title>
  <desc id="social-desc">Facebook and Instagram Graph API comments are pulled by a unified scraper into a per-brand, per-platform PostgreSQL schema, tagged by a fine-tuned BERT classifier mapping 11 model classes into a 9-category business taxonomy, and surfaced on a dashboard with PDF report export. Verified from the akhnatonTradingAndDistribution/Social-Listening- repository.</desc>
  <defs>
    <marker id="social-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M160,50 L320,64" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#social-arrow)"/>
  <path d="M480,50 L320,64" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#social-arrow)"/>
  <path d="M320,104 L320,118" stroke="#6b7382" stroke-width="1.5" marker-end="url(#social-arrow)"/>
  <path d="M320,158 L320,172" stroke="#6b7382" stroke-width="1.5" marker-end="url(#social-arrow)"/>
  <path d="M320,212 L320,226" stroke="#6b7382" stroke-width="1.5" marker-end="url(#social-arrow)"/>

  <rect x="60" y="10" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="160" y="35" text-anchor="middle" font-size="10" fill="#eef1f4">Facebook Graph API</text>

  <rect x="380" y="10" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="480" y="35" text-anchor="middle" font-size="10" fill="#eef1f4">Instagram Graph API</text>

  <rect x="220" y="64" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="89" text-anchor="middle" font-size="10.5" fill="#eef1f4">Unified Scraper</text>

  <rect x="190" y="118" width="260" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="138" text-anchor="middle" font-size="10" fill="#eef1f4">PostgreSQL</text>
  <text x="320" y="152" text-anchor="middle" font-size="9" fill="#a7afba">per brand · per platform</text>

  <rect x="170" y="172" width="300" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="192" text-anchor="middle" font-size="10" fill="#eef1f4">BERT Classifier</text>
  <text x="320" y="205" text-anchor="middle" font-size="9" fill="#a7afba">11 classes → 9-category taxonomy</text>

  <rect x="210" y="226" width="220" height="34" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="320" y="247" text-anchor="middle" font-size="10" fill="#eef1f4">Dashboard + PDF Reports</text>
</svg>
