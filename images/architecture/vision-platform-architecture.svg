<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 226" role="img" aria-labelledby="vision-title vision-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="vision-title">Security &amp; Vision Intelligence Platform architecture</title>
  <desc id="vision-desc">Existing camera feeds are processed by fire/violence detection, license-plate recognition, and face-recognition models running across CPU and GPU inference, driving real-time alerting and attendance tracking.</desc>
  <defs>
    <marker id="vision-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M320,50 L110,64" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M320,50 L320,64" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M320,50 L530,64" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M110,104 L320,118" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M320,104 L320,118" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M530,104 L320,118" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#vision-arrow)"/>
  <path d="M320,158 L320,172" stroke="#6b7382" stroke-width="1.5" marker-end="url(#vision-arrow)"/>

  <rect x="245" y="10" width="150" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="35" text-anchor="middle" font-size="10.5" fill="#eef1f4">Camera Feeds</text>

  <rect x="20" y="64" width="180" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="110" y="80" text-anchor="middle" font-size="9.5" fill="#eef1f4">Fire / Violence</text>
  <text x="110" y="93" text-anchor="middle" font-size="9.5" fill="#eef1f4">Detection</text>

  <rect x="230" y="64" width="180" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="80" text-anchor="middle" font-size="9.5" fill="#eef1f4">License-Plate</text>
  <text x="320" y="93" text-anchor="middle" font-size="9.5" fill="#eef1f4">Recognition</text>

  <rect x="440" y="64" width="180" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="530" y="89" text-anchor="middle" font-size="9.5" fill="#eef1f4">Face Recognition</text>

  <rect x="245" y="118" width="150" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="143" text-anchor="middle" font-size="10.5" fill="#eef1f4">CPU / GPU Inference</text>

  <rect x="190" y="172" width="260" height="34" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="320" y="193" text-anchor="middle" font-size="10" fill="#eef1f4">Real-Time Alerting &amp; Attendance</text>
</svg>
