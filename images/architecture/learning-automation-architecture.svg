<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 226" role="img" aria-labelledby="learnauto-title learnauto-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="learnauto-title">AI-Powered Learning Automation Platform architecture</title>
  <desc id="learnauto-desc">Audio and video files are transcribed with OpenAI Whisper while PDF files are extracted directly, then both paths merge into NLP summarization before being delivered through asynchronous FastAPI endpoints.</desc>
  <defs>
    <marker id="learnauto-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M160,50 L160,64" stroke="#6b7382" stroke-width="1.5" marker-end="url(#learnauto-arrow)"/>
  <path d="M480,50 L480,64" stroke="#6b7382" stroke-width="1.5" marker-end="url(#learnauto-arrow)"/>
  <path d="M160,104 L320,118" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#learnauto-arrow)"/>
  <path d="M480,104 L320,118" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#learnauto-arrow)"/>
  <path d="M320,158 L320,172" stroke="#6b7382" stroke-width="1.5" marker-end="url(#learnauto-arrow)"/>

  <rect x="60" y="10" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="160" y="35" text-anchor="middle" font-size="10.5" fill="#eef1f4">Audio / Video Input</text>

  <rect x="380" y="10" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="480" y="35" text-anchor="middle" font-size="10.5" fill="#eef1f4">PDF Input</text>

  <rect x="60" y="64" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="160" y="89" text-anchor="middle" font-size="10" fill="#eef1f4">Whisper Transcription</text>

  <rect x="380" y="64" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="480" y="89" text-anchor="middle" font-size="10" fill="#eef1f4">PDF Extraction</text>

  <rect x="220" y="118" width="200" height="40" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="320" y="143" text-anchor="middle" font-size="10.5" fill="#eef1f4">NLP Summarization</text>

  <rect x="245" y="172" width="150" height="34" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="320" y="193" text-anchor="middle" font-size="9.5" fill="#eef1f4">Async API Delivery</text>
</svg>
