<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 140" role="img" aria-labelledby="salesint-title salesint-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="salesint-title">Enterprise Sales Intelligence Platform architecture</title>
  <desc id="salesint-desc">A natural-language business question passes through intent interpretation, schema context selection, SQL generation, and a validation and execution step against the Oracle database, before returning a natural-language explanation to the user.</desc>
  <defs>
    <marker id="salesint-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M130,70 L150,70" stroke="#6b7382" stroke-width="1.5" marker-end="url(#salesint-arrow)"/>
  <path d="M290,70 L310,70" stroke="#6b7382" stroke-width="1.5" marker-end="url(#salesint-arrow)"/>
  <path d="M470,70 L490,70" stroke="#6b7382" stroke-width="1.5" marker-end="url(#salesint-arrow)"/>
  <path d="M610,70 L630,70" stroke="#6b7382" stroke-width="1.5" marker-end="url(#salesint-arrow)"/>
  <path d="M780,70 L800,70" stroke="#6b7382" stroke-width="1.5" marker-end="url(#salesint-arrow)"/>

  <rect x="20" y="48" width="110" height="44" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="75" y="74" text-anchor="middle" font-size="10" fill="#eef1f4">User Question</text>

  <rect x="150" y="48" width="140" height="44" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="220" y="74" text-anchor="middle" font-size="10" fill="#eef1f4">Intent Interpretation</text>

  <rect x="310" y="48" width="160" height="44" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="390" y="74" text-anchor="middle" font-size="9.5" fill="#eef1f4">Schema Context Selection</text>

  <rect x="490" y="48" width="120" height="44" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="550" y="74" text-anchor="middle" font-size="10" fill="#eef1f4">SQL Generation</text>

  <rect x="630" y="48" width="150" height="44" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="705" y="74" text-anchor="middle" font-size="9.5" fill="#eef1f4">Validation &amp; Execution</text>

  <rect x="800" y="48" width="120" height="44" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="860" y="74" text-anchor="middle" font-size="10" fill="#eef1f4">NL Explanation</text>
</svg>
