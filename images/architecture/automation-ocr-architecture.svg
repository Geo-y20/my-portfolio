<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 170" role="img" aria-labelledby="ocr-title ocr-desc" font-family="'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace">
  <title id="ocr-title">Product-Label OCR architecture</title>
  <desc id="ocr-desc">A product-label image is preprocessed and sent to Google Cloud Vision OCR with Arabic and English language hints, then batch number, manufacturing date, expiry date, and quantity are extracted and validated by regex before returning a structured JSON or HTML result. Verified from the akhnatonTradingAndDistribution/Automation-OCR repository.</desc>
  <defs>
    <marker id="ocr-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6b7382"/>
    </marker>
  </defs>

  <path d="M170,34 L190,34" stroke="#6b7382" stroke-width="1.5" marker-end="url(#ocr-arrow)"/>
  <path d="M350,34 L370,34" stroke="#6b7382" stroke-width="1.5" marker-end="url(#ocr-arrow)"/>
  <path d="M465,58 L185,110" stroke="#6b7382" stroke-width="1.5" fill="none" marker-end="url(#ocr-arrow)"/>
  <path d="M285,134 L305,134" stroke="#6b7382" stroke-width="1.5" marker-end="url(#ocr-arrow)"/>

  <rect x="20" y="10" width="150" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="95" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">Label Image</text>
  <text x="95" y="44" text-anchor="middle" font-size="9.5" fill="#eef1f4">Upload</text>

  <rect x="190" y="10" width="160" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="270" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">Preprocessing</text>
  <text x="270" y="44" text-anchor="middle" font-size="8.5" fill="#a7afba">contrast / sharpen</text>

  <rect x="370" y="10" width="190" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="465" y="30" text-anchor="middle" font-size="9.5" fill="#eef1f4">Google Vision OCR</text>
  <text x="465" y="44" text-anchor="middle" font-size="8.5" fill="#a7afba">Arabic + English hints</text>

  <rect x="85" y="110" width="200" height="48" rx="6" fill="#1c222e" stroke="#2a3140"/>
  <text x="185" y="130" text-anchor="middle" font-size="9.5" fill="#eef1f4">Field Extraction &amp;</text>
  <text x="185" y="144" text-anchor="middle" font-size="8.5" fill="#a7afba">Validation (regex)</text>

  <rect x="305" y="110" width="190" height="48" rx="6" fill="#1c222e" stroke="#4DD8C4" stroke-width="1.5"/>
  <text x="400" y="130" text-anchor="middle" font-size="9.5" fill="#eef1f4">Structured Output</text>
  <text x="400" y="144" text-anchor="middle" font-size="8.5" fill="#a7afba">JSON / HTML</text>
</svg>
